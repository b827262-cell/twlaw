services:
  # 1. 向量資料庫
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=False
    networks:
      - rag-network

  # 2. AI 模型大腦 (修正 GPU 語法)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - rag-network

  # 3. RAG 決策引擎 API
  rag-api:
    build:
      context: ..
      dockerfile: rag-system/Dockerfile
    container_name: rag-api
    restart: always
    working_dir: /app
    ports:
      - "8001:8000"
    volumes:
      - ../app:/app  # ✅ 這一行就夠了，它已經包含了 tw-law-data
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_DB_PATH=/app/chroma_db
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_HTTP_PORT=8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - chromadb
      - ollama
    networks:
      - rag-network

  # 4. 前端介面
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    restart: always
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=medical_law_secret
    volumes:
      - ./data/openwebui:/app/backend/data
    depends_on:
      - ollama
      - rag-api
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
